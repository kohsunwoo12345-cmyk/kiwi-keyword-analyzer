<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>마케팅 자동화 — BYGENCY</title>
<link rel="icon" type="image/png" sizes="256x256" href="/icon.png">
<link rel="shortcut icon" type="image/png" href="/icon.png">
<link rel="apple-touch-icon" sizes="512x512" href="/apple-icon.png">
<script>
/* BYGENCY 세션 부트스트랩 — API는 쿠키 세션(bg_session)으로 인증되며,
   localStorage.user/adminUser 는 웹푸시 user_id 등 표시용으로만 사용된다.
   /api/me 로 현재 로그인 사용자를 채워둔다(리로드 없음). */
(function(){
  try {
    if (localStorage.getItem('adminUser') || localStorage.getItem('user')) return;
    fetch('/api/me', { credentials: 'include' }).then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
      if (!d) return;
      var u = d.user || d;
      if (u && (u.id || u.email)) {
        var s = JSON.stringify({ id: u.id, role: u.role, name: u.name, email: u.email, user_type: u.user_type });
        localStorage.setItem('user', s); localStorage.setItem('adminUser', s);
      }
    }).catch(function(){});
  } catch(_){}
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--sidebar:#ffffff;--card:#ffffff;--card2:#f8fafc;
  --border:#e2e8f0;--border2:#cbd5e1;
  --accent:#6366f1;--accent-light:#eef2ff;--accent2:#8b5cf6;
  --green:#10b981;--green-light:#ecfdf5;
  --yellow:#f59e0b;--yellow-light:#fffbeb;
  --red:#ef4444;--red-light:#fef2f2;
  --blue:#6366f1;--blue-light:#eff6ff;
  --cyan:#06b6d4;--orange:#f97316;--pink:#ec4899;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;--text4:#cbd5e1;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -1px rgba(0,0,0,.04);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);
}
html,body{height:100%;overflow:hidden}
body{display:flex;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;font-size:14px;line-height:1.5}

/* ─── SIDEBAR ─── */
#sidebar{
  width:240px;min-width:240px;background:var(--sidebar);
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  box-shadow:var(--shadow);z-index:100;
  transition:width .25s ease,min-width .25s ease;overflow:hidden;
}
#sidebar.collapsed{width:64px;min-width:64px}
.sb-logo{
  height:60px;padding:0 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.sb-logo-icon{
  width:36px;height:36px;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
}
.sb-logo-text{font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;letter-spacing:-.3px}
.sb-logo-sub{font-size:10px;color:var(--text3);font-weight:500;margin-top:1px}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto;overflow-x:hidden}
.sb-section{
  padding:8px 10px 4px;font-size:10px;font-weight:700;
  color:var(--text3);letter-spacing:.1em;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;
}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;cursor:pointer;border-radius:8px;
  transition:all .15s;color:var(--text2);
  white-space:nowrap;overflow:hidden;margin-bottom:2px;
}
.sb-item:hover{background:#f1f5f9;color:var(--text)}
.sb-item.active{background:var(--accent-light);color:var(--accent)}
.sb-item.active .sb-item-icon svg{stroke:var(--accent)}
.sb-item-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-item-icon svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.sb-item.active .sb-item-icon svg{stroke:var(--accent)}
.sb-item-label{font-size:13px;font-weight:600}
.sb-badge{margin-left:auto;background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;flex-shrink:0}
.sb-sub-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px 7px 32px;cursor:pointer;border-radius:8px;
  transition:all .15s;color:var(--text3);
  white-space:nowrap;overflow:hidden;margin-bottom:1px;font-size:12px;font-weight:600;
}
.sb-sub-item:hover{background:#f1f5f9;color:var(--text2)}
.sb-sub-item.active{background:var(--accent-light);color:var(--accent)}
.sb-sub-item-icon{width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-sub-item-icon svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.sb-footer{padding:12px 8px;border-top:1px solid var(--border);flex-shrink:0}
.sb-collapse-btn{
  width:100%;background:none;border:1px solid var(--border);
  color:var(--text2);padding:8px;border-radius:8px;cursor:pointer;
  font-size:12px;font-weight:600;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.sb-collapse-btn:hover{background:#f1f5f9;border-color:var(--border2)}

/* ─── MAIN ─── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{
  height:60px;background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;
  box-shadow:var(--shadow);
}
.topbar-breadcrumb{font-size:12px;color:var(--text3);font-weight:500}
.topbar-title{font-size:18px;font-weight:800;color:var(--text);flex:1;letter-spacing:-.4px}
.topbar-actions{display:flex;gap:8px;align-items:center}
#content{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}

/* ─── CARDS ─── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow)}
.card+.card{margin-top:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid12{display:grid;grid-template-columns:1fr 2fr;gap:16px}

/* ─── STAT CARDS ─── */
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:18px 20px;
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--stat-color,var(--accent))}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;background:var(--stat-bg,var(--accent-light))}
.stat-icon svg{width:20px;height:20px;stroke:var(--stat-color,var(--accent));stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.stat-value{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1}
.stat-label{font-size:12px;color:var(--text3);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
.stat-change{font-size:12px;margin-top:6px;font-weight:600;display:flex;align-items:center;gap:4px}
.stat-change.up{color:var(--green)}.stat-change.down{color:var(--red)}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;line-height:1}
.btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(99,102,241,.3)}.btn-primary:hover{background:#4f46e5;box-shadow:0 4px 8px rgba(99,102,241,.35)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#059669}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border);box-shadow:var(--shadow)}.btn-secondary:hover{background:#f8fafc;border-color:var(--border2)}
.btn-warning{background:var(--yellow);color:#fff}.btn-warning:hover{background:#d97706}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:#f1f5f9;color:var(--text);border-color:var(--border2)}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:6px}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-lg{padding:11px 22px;font-size:14px}
.btn-icon{padding:8px;min-width:34px;justify-content:center}
.btn-icon svg{width:15px;height:15px}

/* ─── FORMS ─── */
.form-row{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1}
label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
input,select,textarea{
  background:var(--card2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);padding:9px 12px;font-size:13px;width:100%;
  outline:none;transition:border .15s,box-shadow .15s;font-family:inherit;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
textarea{resize:vertical;min-height:80px}
input[type=datetime-local]{color-scheme:light}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-draft{background:#f1f5f9;color:#64748b}
.badge-running{background:var(--green-light);color:#059669}
.badge-sent{background:var(--blue-light);color:var(--blue)}
.badge-paused{background:var(--yellow-light);color:#d97706}
.badge-concluded{background:var(--accent-light);color:var(--accent)}
.badge-failed{background:var(--red-light);color:var(--red)}
.badge-active{background:var(--green-light);color:#059669}
.ch-email{background:var(--blue-light);color:var(--blue)}
.ch-sms{background:var(--green-light);color:var(--green)}
.ch-mms{background:#e0f2fe;color:#0284c7}
.ch-alimtalk{background:var(--yellow-light);color:#d97706}
.ch-web_push{background:var(--accent-light);color:var(--accent)}
.ch-app_push{background:#fff7ed;color:var(--orange)}
.ch-inapp{background:#fdf2f8;color:var(--pink)}

/* ─── TABLE ─── */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;background:var(--card)}
thead{background:#f8fafc}
th{padding:11px 16px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
td{padding:13px 16px;font-size:13px;border-bottom:1px solid #f1f5f9;color:var(--text)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafbfc}

/* ─── MODAL ─── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-lg{max-width:780px}
.modal-xl{max-width:1100px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px;color:var(--text)}
.modal-title svg{width:22px;height:22px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ─── SEGMENT GRID ─── */
.seg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.seg-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  padding:18px 16px;cursor:pointer;transition:all .2s;position:relative;
  overflow:hidden;box-shadow:var(--shadow);
}
.seg-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--seg-color,var(--accent));border-radius:12px 12px 0 0}
.seg-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.seg-card.active{border-color:var(--accent);background:var(--accent-light)}
.seg-icon{width:40px;height:40px;border-radius:10px;background:var(--seg-bg,var(--accent-light));display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.seg-icon svg{width:20px;height:20px;stroke:var(--seg-color,var(--accent));stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.seg-count{font-size:24px;font-weight:800;color:var(--text);line-height:1}
.seg-label{font-size:13px;font-weight:700;color:var(--text);margin-top:4px}
.seg-desc{font-size:11px;color:var(--text3);margin-top:3px}
.seg-pct{font-size:11px;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:4px}

/* ─── SLIDE PANEL ─── */
.slide-panel{
  position:fixed;right:0;top:0;bottom:0;width:680px;
  background:var(--card);border-left:1px solid var(--border);
  z-index:200;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 32px rgba(0,0,0,.1);
}
.slide-panel.open{transform:translateX(0)}
.panel-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--card)}
.panel-title{font-size:16px;font-weight:800;flex:1;color:var(--text)}
.panel-body{flex:1;overflow-y:auto;padding:20px 24px;background:var(--bg)}
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:199;backdrop-filter:blur(1px)}
.panel-overlay.open{display:block}

/* ─── CANVAS BUILDER ─── */
.canvas-wrap{background:var(--bg);border-radius:10px;border:1px solid var(--border);min-height:500px;position:relative;overflow:hidden;display:flex}
.node-palette{
  width:200px;min-width:200px;border-right:1px solid var(--border);
  background:var(--card);padding:12px;display:flex;flex-direction:column;gap:6px;
}
.node-palette-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:4px 2px;margin-bottom:4px}
.canvas-node-btn{
  background:var(--card2);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:600;color:var(--text);transition:all .15s;
}
.canvas-node-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.canvas-node-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.canvas-board{flex:1;position:relative;overflow:auto;min-height:500px;background:var(--bg);background-image:radial-gradient(var(--border) 1px,transparent 1px);background-size:24px 24px}
.flow-node{
  position:absolute;background:var(--card);border:2px solid var(--border);
  border-radius:12px;padding:14px 16px;min-width:160px;cursor:move;
  user-select:none;transition:border-color .15s,box-shadow .15s;
  box-shadow:var(--shadow);
}
.flow-node:hover,.flow-node.selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.flow-node-type{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:700;display:flex;align-items:center;gap:5px}
.flow-node-type svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none}
.flow-node-name{font-size:13px;font-weight:700;color:var(--text)}
.flow-node-detail{font-size:11px;color:var(--text3);margin-top:3px}
.flow-node-port{width:12px;height:12px;border-radius:50%;background:var(--accent);position:absolute;cursor:crosshair;border:2px solid var(--card)}
.port-out{bottom:-7px;left:50%;transform:translateX(-50%)}
.port-in{top:-7px;left:50%;transform:translateX(-50%)}
.node-trigger{border-color:#bbf7d0}.node-trigger .flow-node-type{color:var(--green)}
.node-message{border-color:#bfdbfe}.node-message .flow-node-type{color:var(--blue)}
.node-wait{border-color:#fde68a}.node-wait .flow-node-type{color:var(--yellow)}
.node-condition{border-color:#a5f3fc}.node-condition .flow-node-type{color:var(--cyan)}
.node-split{border-color:#ddd6fe}.node-split .flow-node-type{color:var(--accent2)}
.node-exit{border-color:#fecaca}.node-exit .flow-node-type{color:var(--red)}

/* ─── A/B TEST ─── */
.ab-variant{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.ab-bar{height:8px;border-radius:4px;background:var(--border);margin:6px 0;overflow:hidden}
.ab-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
.ab-winner{border-color:var(--green);background:var(--green-light)}
.ab-winner-badge{background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:8px}

/* ─── ANALYTICS ─── */
.chart-bar-wrap{display:flex;flex-direction:column;gap:10px}
.chart-bar-row{display:flex;align-items:center;gap:12px}
.chart-bar-label{width:110px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0;font-weight:600}
.chart-bar-track{flex:1;height:24px;background:var(--bg);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.chart-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:700;color:#fff;transition:width .6s ease}
.chart-bar-val{width:60px;font-size:12px;font-weight:700;flex-shrink:0;color:var(--text)}
.funnel-step{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;
  box-shadow:var(--shadow);
}
.funnel-step-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.funnel-step-icon svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.funnel-label{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.funnel-count{font-size:22px;font-weight:800;color:var(--text)}
.funnel-rate{font-size:12px;color:var(--text3);width:60px;text-align:right;font-weight:600}
.timeline-chart{display:flex;align-items:flex-end;gap:3px;height:80px;padding:4px 0}
.timeline-bar{flex:1;border-radius:4px 4px 0 0;background:var(--accent);opacity:.6;transition:height .4s,opacity .15s;min-width:8px;cursor:pointer}
.timeline-bar:hover{opacity:1}
.cohort-table{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.cohort-table table{min-width:600px}
.cohort-cell{text-align:center;font-size:12px;font-weight:700;border-radius:4px;padding:4px 8px}

/* ─── FILTER CHIPS ─── */
.filter-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-light);border:1px solid rgba(99,102,241,.2);color:var(--accent);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.filter-chip svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none}
.filter-chip button{background:none;border:none;color:inherit;cursor:pointer;padding:0;display:flex;align-items:center;opacity:.7}
.filter-chip button:hover{opacity:1}

/* ─── INAPP PREVIEW ─── */
.inapp-preview{background:#fff;border-radius:16px;padding:24px;color:#0f172a;max-width:320px;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.inapp-preview h3{font-size:16px;font-weight:700;margin-bottom:8px}
.inapp-preview p{font-size:13px;color:#64748b;margin-bottom:16px;line-height:1.5}
.inapp-preview button{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%}

/* ─── TOAST ─── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:13px 16px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:10px;min-width:260px;
  box-shadow:var(--shadow-lg);animation:slideIn .3s ease;pointer-events:all;
  color:var(--text);
}
.toast svg{width:18px;height:18px;flex-shrink:0;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.toast-success{border-left:4px solid var(--green)}.toast-success svg{stroke:var(--green)}
.toast-error{border-left:4px solid var(--red)}.toast-error svg{stroke:var(--red)}
.toast-info{border-left:4px solid var(--accent)}.toast-info svg{stroke:var(--accent)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ─── MISC ─── */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty svg{width:40px;height:40px;stroke:var(--text4);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 12px;display:block}
.empty p{font-size:14px;color:var(--text3);margin-top:8px}
.divider{height:1px;background:var(--border);margin:16px 0}
.tag{display:inline-block;background:#f1f5f9;border:1px solid var(--border);color:var(--text2);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.info-box{background:var(--accent-light);border:1px solid rgba(99,102,241,.2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--text2)}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
.section-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-.3px}
.section-sub{font-size:13px;color:var(--text3);margin-bottom:20px}
@media(max-width:768px){
  #sidebar{width:64px;min-width:64px}.sb-item-label,.sb-logo-text,.sb-section,.sb-logo-sub{display:none}.sb-sub-item{display:none}
  #content{padding:12px}.grid3{grid-template-columns:1fr}.grid4{grid-template-columns:1fr 1fr}
}
#sidebar.collapsed .sb-sub-item{display:none}

/* ─── INLINE ICON HELPERS ─── */
.ic{display:inline-flex;align-items:center;flex-shrink:0}
.ic svg{stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>

<div class="panel-overlay" id="panel-overlay" onclick="closeSegPanel()"></div>

  <div class="panel-header">
    <div style="display:flex;flex-direction:column;flex:1;min-width:0">
      <div class="panel-title" id="seg-panel-title">세그먼트 상세</div>
      <div id="seg-panel-desc" style="font-size:12px;color:var(--text3);margin-top:2px"></div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button class="btn btn-primary btn-sm" onclick="createCampaignFromSeg()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        캠페인 발송
      </button>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div class="panel-body">
    <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center">
      <div style="flex:1;position:relative">

        <input type="text" id="seg-search" placeholder="이름 또는 이메일 검색..." style="padding-left:34px" oninput="filterSegUsers(this.value)">
      </div>
      <span id="seg-total-badge" class="badge badge-running"></span>
    </div>
    <div id="seg-panel-list"></div>
    <div id="seg-pagination" style="display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap;align-items:center"></div>

</div>

<!-- 캠페인 생성 모달 -->
<div class="modal-overlay" id="modal-campaign">
  <div class="modal modal-lg">
    <div class="modal-title">
      <svg viewBox="0 0 24 24" style="color:var(--accent)"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>

    <div class="form-row">
      <div class="form-group"><label>캠페인 이름 *</label><input id="c-name" placeholder="예: 7월 재활성화 캠페인"></div>
      <div class="form-group" style="max-width:160px">
        <label>채널 *</label>
        <select id="c-channel" onchange="onChannelChange()">
          <option value="email">이메일</option>
          <option value="web_push">웹 푸시</option>
          <option value="sms">SMS</option>
          <option value="mms">MMS</option>
          <option value="alimtalk">알림톡</option>
          <option value="app_push">앱 푸시</option>
          <option value="inapp">인앱</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="max-width:160px">
        <label>타겟 방식</label>
        <select id="c-target-type" onchange="onTargetTypeChange()">
          <option value="segment">세그먼트</option>
          <option value="group">타겟 그룹</option>
        </select>
      </div>
      <div class="form-group" id="c-seg-wrap">
        <label>세그먼트</label>
        <select id="c-segment">
          <option value="all">전체 유저</option>
          <option value="active_week">주간 활성</option>
          <option value="new_user">신규 가입</option>
          <option value="dormant_30">30일 휴면</option>
          <option value="dormant_90">장기 이탈</option>
          <option value="push_sub">푸시 구독자</option>
          <option value="email_consent">이메일 동의</option>
        </select>
      </div>
      <div class="form-group" id="c-group-wrap" style="display:none">
        <label>타겟 그룹</label>
        <select id="c-group-id"></select>
      </div>
    </div>
    <div class="form-row" id="c-subject-row">
      <div class="form-group"><label>제목 / 푸시 타이틀</label><input id="c-subject" placeholder="메시지 제목"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>메시지 본문 *</label><textarea id="c-message" rows="4" placeholder="발송할 메시지 내용..."></textarea></div>
    </div>
    <div id="c-email-wrap">
      <div class="form-row">
        <div class="form-group"><label>이메일 HTML (선택)</label><textarea id="c-email-html" rows="3" placeholder="HTML 이메일 내용 (비워두면 자동 변환)"></textarea></div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>클릭 URL (선택)</label><input id="c-url" placeholder="https://..."></div>
      <div class="form-group"><label>예약 발송 (선택)</label><input type="datetime-local" id="c-scheduled"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-campaign')">취소</button>
      <button class="btn btn-primary" onclick="saveCampaign()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        저장
      </button>
    </div>
  </div>
</div>

<!-- 캔버스 편집 모달 -->
<div class="modal-overlay" id="modal-canvas">
  <div class="modal modal-xl">
    <div class="modal-title">
      <svg viewBox="0 0 24 24" style="color:var(--accent)"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="19" cy="12" r="2"/><circle cx="12" cy="19" r="2"/><path d="M7 12h3M14 12h3M12 7v3M12 14v3"/></svg>
      <span id="canvas-modal-title">캔버스 편집</span>
    </div>
    <input type="hidden" id="canvas-id">
    <div class="form-row">
      <div class="form-group"><label>캔버스 이름 *</label><input id="canvas-name" placeholder="예: 신규 유저 온보딩 Journey"></div>
      <div class="form-group" style="max-width:180px">
        <label>트리거 타입</label>
        <select id="canvas-trigger-type" onchange="onCanvasTriggerChange()">
          <option value="event">이벤트 기반</option>
          <option value="segment">세그먼트 입장</option>
          <option value="schedule">스케줄</option>
        </select>
      </div>
      <div class="form-group" style="max-width:200px" id="canvas-trigger-event-wrap">
        <label>트리거 이벤트</label>
        <select id="canvas-trigger-event">
          <option value="signup">회원가입</option>
          <option value="login">로그인</option>
          <option value="purchase">구매</option>
          <option value="inactivity">미접속</option>
        </select>
      </div>
    </div>
    <div style="display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:12px 0;height:480px">
      <div class="node-palette">

function consentPageClick(btn) {

function goTo(page) {
  currentPage = page;
  document.querySelectorAll('.sb-item,.sb-sub-item').forEach(function(el) {
    el.classList.remove('active');
  });
  var navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  // 서브 아이템 경우 부모 항목(nav-push)도 활성화 표시
  var parentMap = { 'push-consent': 'nav-push' };
  if (parentMap[page]) {
    var parentEl = document.getElementById(parentMap[page]);
    if (parentEl) parentEl.classList.add('active');
  }
  var cfg = PAGE_CONFIG[page] || {};
  document.getElementById('topbar-title').textContent = cfg.title || page;
  document.getElementById('topbar-cta-label').textContent = cfg.cta || '추가';
  renderPage(page);
}

function ctaAction() {
  var actions = {
    overview:     function() { openCampaignModal(); },
    campaigns:    function() { openCampaignModal(); },
    canvas:       function() { openCanvasModal(); },
    inapp:        function() { openInappModal(); },
    segments:     function() { loadSegments(); },
    targeting:    function() { openTargetModal(null); },
    abtests:      function() { openABTestModal(); },
    promotions:   function() { openPromoModal(null); },
    'funnel-crm': function() { renderFunnelCRM(); },
    push:         function() { openQuickPushModal(); },
    'push-consent': function() { renderPushConsentPage(); },
    rules:        function() { openRuleModal(); },
    settings:     function() { saveSettings(); },
  };
  if (actions[currentPage]) actions[currentPage]();
}

function refreshCurrent() { renderPage(currentPage); }

function renderPage(page) {
  var pages = {
    overview:  renderOverview,
    campaigns: renderCampaigns,
    canvas:    renderCanvas,
    inapp:     renderInapp,
    segments:  renderSegments,
    targeting: renderTargeting,
    abtests:      renderABTests,
    analytics:    renderAnalytics,
    promotions:   renderPromotions,
    'funnel-crm': renderFunnelCRM,
    push:         renderPushPage,
    'push-consent': renderPushConsentPage,
    rules:        renderRules,

    setContent('<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9 9h.01M15 9h.01M9.5 13a3.5 3.5 0 0 0 5 0"/></svg><p>준비 중</p></div>');

}

function apiFetch(path, options) {

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg, type) {
  type = type || 'success';
  var iconMap = { success: ICONS.ok_circle, error: ICONS.warning, info: ICONS.info };
  var el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.innerHTML = SPIN_CSS + (iconMap[type] || ICONS.info) + '<span>' + msg + '</span>';
  document.getElementById('toast-container').appendChild(el);
  setTimeout(function() { el.remove(); }, 3500);
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function chBadge(ch) {
  var map = {
    email:'이메일', web_push:'웹 푸시', sms:'SMS', mms:'MMS',
    alimtalk:'알림톡', app_push:'앱 푸시', inapp:'인앱'
  };
  return '<span class="badge ch-' + (ch||'email') + '">' + (map[ch]||ch) + '</span>';
}

function statusBadge(s) {
  var map = {draft:'초안',running:'실행중',sent:'완료',paused:'일시정지',concluded:'종료',failed:'실패',active:'활성'};
  return '<span class="badge badge-' + (s||'draft') + '">' + (map[s]||s) + '</span>';
}

function fmtDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}

function fmtN(n) { return (n||0).toLocaleString(); }

function pct(a, b) { return b > 0 ? ((a/b)*100).toFixed(1)+'%' : '0%'; }

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function openCampaignModal(data) {
  document.getElementById('edit-campaign-id').value = data && data.id ? data.id : '';
  document.getElementById('modal-campaign-title').textContent = data && data.id ? '캠페인 편집' : '새 캠페인';
  document.getElementById('c-name').value = data && data.name ? data.name : '';
  document.getElementById('c-channel').value = data && data.channel ? data.channel : 'email';
  document.getElementById('c-segment').value = data && data.target_segment ? data.target_segment : 'all';
  document.getElementById('c-subject').value = data && data.subject ? data.subject : '';
  document.getElementById('c-message').value = data && data.message ? data.message : '';
  document.getElementById('c-email-html').value = data && data.email_html ? data.email_html : '';
  document.getElementById('c-url').value = data && data.click_url ? data.click_url : '';
  document.getElementById('c-scheduled').value = '';
  onChannelChange();
  onTargetTypeChange();
  openModal('modal-campaign');
}

function onChannelChange() {
  var ch = document.getElementById('c-channel').value;
  var subjectRow = document.getElementById('c-subject-row');
  var emailWrap = document.getElementById('c-email-wrap');
  if (subjectRow) subjectRow.style.display = (ch === 'sms' || ch === 'alimtalk') ? 'none' : '';
  if (emailWrap) emailWrap.style.display = ch === 'email' ? '' : 'none';
}

function onTargetTypeChange() {
  var t = document.getElementById('c-target-type').value;
  document.getElementById('c-seg-wrap').style.display = t === 'segment' ? '' : 'none';
  document.getElementById('c-group-wrap').style.display = t === 'group' ? '' : 'none';
}

async function saveCampaign() {
  var name = document.getElementById('c-name').value.trim();
  var msg = document.getElementById('c-message').value.trim();
  if (!name) { toast('캠페인 이름을 입력하세요', 'error'); return; }
  if (!msg) { toast('메시지 본문을 입력하세요', 'error'); return; }
  var id = document.getElementById('edit-campaign-id').value;
  var body = {
    name: name,
    channel: document.getElementById('c-channel').value,
    target_segment: document.getElementById('c-target-type').value === 'group'
      ? 'custom' : document.getElementById('c-segment').value,
    subject: document.getElementById('c-subject').value,
    message: msg,
    email_html: document.getElementById('c-email-html').value,
    click_url: document.getElementById('c-url').value,
    scheduled_at: document.getElementById('c-scheduled').value,
  };
  if (id) body.id = Number(id);
  var r = await apiFetch('?action=save_campaign', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)}).catch(function() { return {}; });
  if (r.ok) { toast('저장됐습니다'); closeModal('modal-campaign'); renderCampaigns(); }
  else toast(r.error||'저장 실패', 'error');
}

async function sendCampaign(id) {
  if (!confirm('지금 즉시 발송하시겠습니까?')) return;
  var r = await apiFetch('?action=send_campaign', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id:id})}).catch(function() { return {}; });
  if (r.ok) { toast('발송이 시작됐습니다'); renderCampaigns(); }
  else toast(r.error||'발송 실패', 'error');
}

async function toggleCampaign(id, action) {
  var r = await apiFetch('?action=toggle_campaign', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id:id, action:action})}).catch(function() { return {}; });
  if (r.ok) { toast('상태가 변경됐습니다'); renderCampaigns(); }
  else toast(r.error||'오류', 'error');
}

async function editCampaign(id) {
  var d = await apiFetch('?action=campaigns').catch(function() { return {}; });
  var c = (d.campaigns||[]).find(function(x) { return x.id === id; });
  if (c) openCampaignModal(c);
}

async function deleteCampaign(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  var r = await apiFetch('?action=delete_campaign', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id:id})}).catch(function() { return {}; });
  if (r.ok) { toast('삭제됐습니다'); renderCampaigns(); }
  else toast(r.error||'삭제 실패', 'error');
}

function addNode(type) {
  var id = 'node_' + (++nodeCounter);

  var labels = { trigger:'회원가입 시', message:'이메일 발송', wait:'3일 대기', condition:'활성 유저?', split:'50/50 분기', exit:'플로우 종료' };
  canvasNodes.push({ id:id, type:type, x: 40 + (canvasNodes.length % 4)*180, y: 40 + Math.floor(canvasNodes.length/4)*120, name:labels[type]||nt.label, detail:'' });

function renderCanvasBoard() {
  var board = document.getElementById('canvas-board');
  if (!board) return;
  board.innerHTML = canvasNodes.map(function(n) {
    var nt = NODE_TYPES[n.type] || NODE_TYPES['message'];
    return '<div class="flow-node node-' + n.type + (selectedNodeId===n.id?' selected':'') + '" id="' + n.id + '"' +
      ' style="left:' + n.x + 'px;top:' + n.y + 'px"' +
      ' data-nid="' + n.id + '" onclick="nodeClick(this)"' +
      ' onmousedown="nodeDragStart(event,this)">' +
      '<div class="flow-node-type" style="color:var(' + nt.colorVar + ')">' + nt.icon + ' ' + nt.label + '</div>' +
      '<div class="flow-node-name">' + esc(n.name) + '</div>' +
      (n.detail ? '<div class="flow-node-detail">' + esc(n.detail) + '</div>' : '') +
      '<div class="flow-node-port port-in"></div>' +
      '<div class="flow-node-port port-out"></div>' +
    '</div>';
  }).join('');
}

var dragging = null;
var dragOX = 0, dragOY = 0;

function startDrag(e, id) {
  e.preventDefault();
  dragging = id;
  var el = document.getElementById(id);
  var node = canvasNodes.find(function(n) { return n.id === id; });
  dragOX = e.clientX - (node ? node.x : 0);
  dragOY = e.clientY - (node ? node.y : 0);
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', stopDrag);
}

function onDrag(e) {
  if (!dragging) return;
  var node = canvasNodes.find(function(n) { return n.id === dragging; });
  if (!node) return;
  node.x = Math.max(0, e.clientX - dragOX);
  node.y = Math.max(0, e.clientY - dragOY);
  var el = document.getElementById(dragging);
  if (el) { el.style.left = node.x + 'px'; el.style.top = node.y + 'px'; }
}

function stopDrag() {
  dragging = null;
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', stopDrag);
}

function selectNode(id) {

async function renderSegments() {
  loading();
  var d = await apiFetch('?action=segments').catch(function() { return {}; });
  // API는 segments를 Object({ heavy:{count,label,...}, ... }) 형태로 반환
  // → Array([{ key:'heavy', count, label, ... }, ...]) 로 변환
  var segsRaw = d.segments || {};
  var segs = Array.isArray(segsRaw)
    ? segsRaw
    : Object.keys(segsRaw).map(function(k) {
        var v = segsRaw[k];
        return { key: k, count: v.count||0, label: v.label||k, desc: v.desc||'', color: v.color||'' };
      });
  // total은 API가 별도 d.total 로 제공; 없으면 segs 중 key==='all' 항목 fallback
  var totalCount = (d.total && d.total > 0) ? d.total
    : (function() {
        var t = segs.find(function(s) { return s.key === 'all'; });
        return t ? (t.count||0) : 1;
      }()) || 1;

  var html = '<div style="margin-bottom:16px"><div class="section-title">세그먼트</div><div class="section-sub">유저 행동 기반 자동 분류 · 세그먼트 클릭 시 상세 목록 확인</div></div>';
  html += '<div class="seg-grid">';
  segs.forEach(function(s) {
    var meta = SEG_META[s.key] || { label:s.label||s.key, desc:'', color:'#6366f1', bg:'#eef2ff', icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>' };
    var pctVal = totalCount > 0 ? ((s.count/totalCount)*100).toFixed(1) : '0';
    html += '<div class="seg-card" style="--seg-color:' + meta.color + ';--seg-bg:' + meta.bg + '"' +
      ' data-skey="' + s.key + '" data-slabel="' + esc(s.label||meta.label) + '" data-sdesc="' + esc(s.desc||meta.desc) + '" data-scount="' + (s.count||0) + '" onclick="segCardClick(this)">' +
      '<div class="seg-icon">' + meta.icon + '</div>' +
      '<div class="seg-count">' + fmtN(s.count) + '</div>' +
      '<div class="seg-label">' + esc(s.label||meta.label) + '</div>' +
      '<div class="seg-desc">' + esc(s.desc||meta.desc) + '</div>' +
      '<div class="seg-pct"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>' + pctVal + '% 비중</div>' +
    '</div>';
  });
  html += '</div>';
  setContent(html);
}

  var totalPages = Math.ceil(total / limit);

  var html = '<span style="font-size:12px;color:var(--text3);font-weight:600">' + page + ' / ' + totalPages + '</span>';
  if (page > 1) {
    html += '<button class="btn btn-ghost btn-xs" data-seg-page="' + (page-1) + '" onclick="segPageClick(this)">' + ICONS.arrow_l + '</button>';

    html += '<button class="btn btn-ghost btn-xs" data-seg-page="' + (page+1) + '" onclick="segPageClick(this)">' + ICONS.arrow_r + '</button>';

          var maxRate = Math.max.apply(null, variants.map(function(v) { return v.open_rate||0; }).concat([1]));
          return '<div style="border:1px solid var(--border);border-radius:12px;padding:16px;background:var(--card)">' +

              '</div>' +
              '<div style="display:flex;gap:6px">' +
                statusBadge(t.status||'running') +
                (t.status !== 'concluded' ? '<button class="btn btn-ghost btn-xs" onclick="concludeABTest(' + t.id + ')">' + ICONS.trophy + ' 종료</button>' : '') +
                '<button class="btn btn-ghost btn-xs" style="color:var(--red)" onclick="deleteABTest(' + t.id + ')">' + ICONS.trash + '</button>' +
              '</div>' +
            '</div>' +
            '<div style="display:flex;gap:10px;flex-wrap:wrap">' +
              variants.map(function(v, vi) {
                var rate = v.open_rate||0;
                var isWinner = t.winner_variant_id && t.winner_variant_id === v.id;
                return '<div class="ab-variant' + (isWinner ? ' ab-winner' : '') + '" style="flex:1;min-width:140px">' +

                  '</div>' +
                  '<div style="font-size:11px;color:var(--text2);margin-bottom:8px">' + esc(v.name||('변형'+String.fromCharCode(65+vi))) + '</div>' +
                  '<div class="ab-bar"><div class="ab-bar-fill" style="width:' + Math.round(rate/maxRate*100) + '%"></div></div>' +
                  '<div style="font-size:13px;font-weight:800;color:var(--accent)">' + rate.toFixed(1) + '%</div>' +
                  '<div style="font-size:11px;color:var(--text3)">' + fmtN(v.sent_count||0) + '명 발송</div>' +
                '</div>';
              }).join('') +
            '</div>' +
          '</div>';
        }).join('') +
        '</div>' :
        '<div class="empty"><svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg><p>A/B 테스트가 없습니다.</p></div>'

  );

      '</tr></thead><tbody id="channel-table-body"></tbody></table></div>' +
    '</div>'
  );

  var sent = ov.total_sent||0;
  var opened = ov.total_opened||0;
  var clicked = ov.total_clicked||0;
  var funnel = [
    {label:'발송 완료', count:sent,   color:'#6366f1', bg:'var(--accent-light)', icon:'<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>'},

    {label:'클릭',     count:clicked, color:'#10b981', bg:'var(--green-light)',  icon:'<svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/></svg>'},
  ];
  document.getElementById('funnel-wrap').innerHTML = funnel.map(function(f) {
    return '<div class="funnel-step">' +
      '<div class="funnel-step-icon" style="background:' + f.bg + ';color:' + f.color + '">' + f.icon + '</div>' +
      '<div class="funnel-label">' + f.label + '</div>' +
      '<div class="funnel-count" style="color:' + f.color + '">' + fmtN(f.count) + '</div>' +
      '<div class="funnel-rate">' + pct(f.count, sent) + '</div>' +
    '</div>';
  }).join('');

  document.getElementById('channel-wrap').innerHTML = channels.length ?
    channels.map(function(c, i) {
      return '<div class="chart-bar-row">' +
        '<div class="chart-bar-label">' + chBadge(c.channel) + '</div>' +
        '<div class="chart-bar-track">' +
          '<div class="chart-bar-fill" style="width:' + Math.round((c.sent||0)/maxSent*100) + '%;background:' + (colors[i]||colors[0]) + '">' +
            (c.sent > maxSent*0.15 ? fmtN(c.sent) : '') +
          '</div>' +
        '</div>' +
        '<div class="chart-bar-val">' + fmtN(c.sent) + '</div>' +
      '</div>';
    }).join('') : '<div style="font-size:13px;color:var(--text3)">데이터 없음</div>';

  document.getElementById('channel-table-body').innerHTML = channels.length ?
    channels.map(function(c) {
      return '<tr>' +
        '<td>' + chBadge(c.channel) + '</td>' +
        '<td style="font-weight:700">' + fmtN(c.sent) + '</td>' +
        '<td>' + fmtN(c.opened||0) + '</td>' +
        '<td style="color:var(--blue);font-weight:700">' + pct(c.opened||0, c.sent) + '</td>' +
        '<td>' + fmtN(c.clicked||0) + '</td>' +
        '<td style="color:var(--green);font-weight:700">' + pct(c.clicked||0, c.sent) + '</td>' +
      '</tr>';
    }).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:20px">데이터 없음</td></tr>';
}

            '<div style="font-size:11px;color:#94a3b8;margin-top:4px">슈퍼플레이스 • 방금 전</div>' +
          '</div>' +
        '</div>' +
      '</div>' +

      '<div class="form-group" style="margin-bottom:14px">' +
        '<label>클릭 시 이동 URL</label>' +

      '</div>' +

          '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> 저장' +

  setTimeout(function() {

    if (picker) picker.addEventListener('click', function(e) {
      var el = e.target;
      while (el && el !== picker) {
        var ch = el.getAttribute('data-ch');
        if (ch) { selectRuleChannel(ch); return; }
        el = el.parentElement;
      }
    });
    // 현재 채널 초기 표시

    if (bodyEl && bodyEl.value) { var b = document.getElementById('preview-body'); if(b) b.textContent = bodyEl.value; }
  }, 50);
}

  document.getElementById('rule-channel').value = ch;
  var colors = { web_push:'var(--accent)', sms:'var(--green)', alimtalk:'#d97706', email:'var(--blue)', mms:'#0284c7', app_push:'var(--orange)', inapp:'var(--pink)' };
  ['web_push','sms','alimtalk','email','mms','app_push','inapp'].forEach(function(c) {
    var el = document.getElementById('ch-pick-' + c);
    if (!el) return;
    if (c === ch) {
      el.style.border = '2px solid ' + (colors[c]||'var(--accent)');
      el.style.background = '#eef2ff';
    } else {
      el.style.border = '2px solid var(--border)';
      el.style.background = 'var(--card)';
    }
  });
  var extra = document.getElementById('push-extra-fields');
  if (extra) extra.style.display = ch === 'web_push' ? 'block' : 'none';
}

async function saveRule(ruleId) {
  var name    = (document.getElementById('rule-name')||{}).value||'';
  var trigger = (document.getElementById('rule-trigger')||{}).value||'';
  var channel = (document.getElementById('rule-channel')||{}).value||'web_push';
  var delay   = parseInt((document.getElementById('rule-delay')||{}).value||'0', 10);
  var subject = (document.getElementById('rule-subject')||{}).value||'';
  var body    = (document.getElementById('rule-body')||{}).value||'';
  var url     = (document.getElementById('rule-url')||{}).value||'';
  var thumb   = (document.getElementById('rule-thumbnail')||{}).value||'';
  if (!name || !subject || !body) { toast('룰 이름, 제목, 내용을 입력하세요', 'error'); return; }
  var payload = { name:name, trigger_event:trigger, channel:channel, delay_hours:delay, message_subject:subject, message_body:body, click_url:url, thumbnail_url:thumb };
  if (ruleId) payload.id = ruleId;
  var r = await apiFetch('?action=save_rule', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) }).catch(function(){ return {}; });
  if (r.ok) { toast('저장됐습니다'); closeModal('rule-modal'); renderRules(); }
  else toast(r.error||'저장 실패', 'error');
}

async function toggleRule(id, active) {
  await apiFetch('?action=toggle_rule', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id:id, is_active:active}) }).catch(function(){});
  toast(active ? '활성화됐습니다' : '비활성화됐습니다');
  renderRules();
}

async function deleteRule(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  var r = await apiFetch('?action=delete_rule', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id:id})}).catch(function() { return {}; });
  if (r.ok) { toast('삭제됐습니다'); renderRules(); }
  else toast(r.error||'삭제 실패', 'error');
}

// 세그먼트 선택 변경 시 배너 카운트 업데이트
function onSegChange() {
  var radios = document.querySelectorAll('input[name="qp-target"]');
  var segData = {
    all:     document.getElementById('qp-cnt-all'),
    new:     document.getElementById('qp-cnt-new'),
    active:  document.getElementById('qp-cnt-active'),
    dormant: document.getElementById('qp-cnt-dormant'),
    payment: document.getElementById('qp-cnt-payment'),
  };
  var segLabels = {
    all:     document.getElementById('qp-seg-label-all'),
    new:     document.getElementById('qp-seg-label-new'),
    active:  document.getElementById('qp-seg-label-active'),
    dormant: document.getElementById('qp-seg-label-dormant'),
    payment: document.getElementById('qp-seg-label-payment'),
  };
  var selectedVal = 'all';
  radios.forEach(function(r) {
    if (r.checked) selectedVal = r.value;
  });
  // 배너 업데이트
  var banner = document.getElementById('qp-banner-cnt');
  var cntEl = document.getElementById('qp-cnt-' + selectedVal);
  if (banner && cntEl) banner.textContent = cntEl.textContent;
  // 라벨 하이라이트 업데이트
  var allVals = ['all','new','active','dormant','payment'];
  allVals.forEach(function(v) {
    var lbl = segLabels[v];
    var cntEl2 = segData[v];
    if (!lbl) return;
    if (v === selectedVal) {
      lbl.style.borderColor = 'var(--accent)';
      lbl.style.background  = 'var(--accent-light)';
      if (cntEl2) cntEl2.style.color = 'var(--accent)';
    } else {
      lbl.style.borderColor = 'var(--border)';
      lbl.style.background  = 'var(--card)';
      if (cntEl2) cntEl2.style.color = 'var(--text2)';
    }
  });
}

// 관리자 브라우저를 직접 웹 푸시 구독 (테스트/진단용)
async function subscribePushNow() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    toast('이 브라우저는 웹 푸시를 지원하지 않습니다', 'error'); return;
  }
  var perm = Notification.permission;
  if (perm === 'denied') {
    toast('브라우저 주소창 왼쪽 🔒아이콘 → 알림 → 허용 으로 변경하세요', 'error'); return;
  }
  if (perm !== 'granted') {
    perm = await Notification.requestPermission();
  }
  if (perm !== 'granted') {
    toast('알림 권한이 거부됐습니다', 'error'); return;
  }
  try {
    // VAPID 공개키 가져오기
    var kd = await fetch(API + '?action=vapid_key').then(function(r){return r.json();}).catch(function(){return {};});
    console.log('[SubscribeNow] vapid_key 응답:', JSON.stringify(kd));
    if (!kd.key) {
      toast('VAPID_PUBLIC_KEY 환경변수가 설정되지 않았습니다. Cloudflare Pages 대시보드에서 설정하세요.', 'error'); return;
    }
    var reg = await navigator.serviceWorker.register('/sw.js', {scope:'/'});
    await navigator.serviceWorker.ready;
    var existing = await reg.pushManager.getSubscription();
    if (existing) await existing.unsubscribe();
    // base64 → Uint8Array
    var b64 = kd.key;
    var padding = '='.repeat((4 - b64.length % 4) % 4);
    var b64n = (b64 + padding).replace(/-/g,'+').replace(/_/g,'/');
    var raw = atob(b64n);
    var arr = new Uint8Array(raw.length);
    for (var i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
    var sub = await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:arr});
    // 서버에 구독 등록
    var key  = sub.getKey('p256dh');
    var auth = sub.getKey('auth');
    var p256 = key  ? btoa(String.fromCharCode.apply(null,Array.from(new Uint8Array(key))))  : '';
    var auth2= auth ? btoa(String.fromCharCode.apply(null,Array.from(new Uint8Array(auth)))) : '';
    var user = null;
    try { user = JSON.parse(localStorage.getItem('adminUser')||localStorage.getItem('user')||'null'); } catch(_){}
    var rr = await fetch(API + '?action=push_subscribe', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({user_id: user&&user.id||null, endpoint:sub.endpoint, p256dh:p256, auth:auth2})
    }).then(function(r){return r.json();}).catch(function(e){return {ok:false,error:String(e)};});
    console.log('[SubscribeNow] push_subscribe 응답:', JSON.stringify(rr));
    if (rr.ok) {
      toast('🔔 이 브라우저가 웹 푸시 구독됐습니다!', 'success');
      setTimeout(function(){ renderPushPage(); }, 800);
    } else {
      toast('구독 등록 실패: ' + (rr.error||'알 수 없음'), 'error');
    }
  } catch(e) {
    console.error('[SubscribeNow] 오류:', e);
    toast('구독 실패: ' + String(e), 'error');
  }
}

async function sendQuickPush() {
  var titleEl = document.getElementById('qp-title');
  var bodyEl  = document.getElementById('qp-body');
  var thumbEl = document.getElementById('qp-thumb');
  var urlEl   = document.getElementById('qp-url');
  var title = (titleEl ? titleEl.value : '').trim();
  var body  = (bodyEl  ? bodyEl.value  : '').trim();
  var thumb = (thumbEl ? thumbEl.value : '').trim();
  var url   = (urlEl   ? urlEl.value   : '').trim();
  if (!title || !body) { toast('제목과 내용을 입력하세요', 'error'); return; }

  // 선택된 세그먼트 라디오 값 읽기
  var targetEl = document.querySelector('input[name="qp-target"]:checked');
  var target = targetEl ? targetEl.value : 'all';

  var btn = document.querySelector('#push-send-modal .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '발송 중...'; }
  var r = await apiFetch('?action=send_push_broadcast', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ title:title, body:body, icon:thumb||'', url:url||'/', target:target })
  }).catch(function() { return {}; });
  if (btn) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> 즉시 발송'; }
  if (r.ok) {
    toast('🔔 ' + fmtN(r.sent||0) + '명에게 발송됐습니다!', 'success');
    closeModal('push-send-modal');
    renderPushPage();
  } else {
    toast(r.error || '발송 실패. VAPID 키를 확인하세요', 'error');
  }
}

function switchConsentTab(tab) {

}

var _consentSearchTimer = null;
function onConsentSearch(val) {
  _consentSearch = val;
  if (_consentSearchTimer) clearTimeout(_consentSearchTimer);
  _consentSearchTimer = setTimeout(function() {
    _consentPage[_consentTab] = 1;
    loadConsentPage(_consentTab, 1);
  }, 400);
}

async function loadConsentPage(tab, page) {
  _consentTab = tab;
  _consentPage[tab] = page;
  var wrap = document.getElementById('consent-table-wrap');
  if (!wrap) return;
  wrap.innerHTML = '<div class="empty" style="padding:30px">' + SPIN_CSS + ICONS.spinner + '<p>로딩 중...</p></div>';
  var search = _consentSearch || '';
  try {
    var r = await apiFetch('?action=push_consent&type=' + tab + '&page=' + page + '&limit=50' + (search ? '&search=' + encodeURIComponent(search) : ''));
    if (!r.ok) throw new Error(r.error || '오류');
    renderConsentTable(wrap, r.users || [], tab);
    renderConsentPagination(r.total || 0, page, 50, tab);
  } catch(e) {
    wrap.innerHTML = '<div class="empty" style="padding:30px">' + ICONS.warning + '<p>' + esc(String(e.message||e)) + '</p></div>';
  }
}

  var rows = users.map(function(u) {

        '<td>' + (isGuest
          ? '<span class="badge badge-draft">비회원</span>'
          : '<a href="/adminsunkoh028741_11263/users/' + u.user_id + '" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:#8b5cf6;text-decoration:none;background:#f5f3ff;padding:3px 9px;border-radius:20px">회원</a>') +

        '<td style="color:var(--text2);font-size:12px">' + esc(u.email || '-') + '</td>' +
        '<td style="font-size:11px;color:var(--text3)">' + fmtDate(u.subscribed_at) + '</td>' +
        '<td style="font-size:12px;color:var(--text2)">' + esc(domain) + '</td>' +
      '</tr>';
    } else {
      var isAdmin = u.role === 'admin' || u.user_type === 'admin';
      return '<tr>' +
        '<td style="color:var(--text3);font-size:11px">#' + u.id + '</td>' +
        '<td style="font-weight:600">' + esc(u.name || '(미입력)') + '</td>' +
        '<td style="color:var(--text2);font-size:12px">' + esc(u.email || '-') + '</td>' +
        '<td>' + (isAdmin ? '<span class="badge badge-running">관리자</span>' : '<span class="badge badge-draft">일반</span>') + '</td>' +
        '<td style="font-size:11px;color:var(--text3)">' + fmtDate(u.created_at) + '</td>' +
        '<td style="font-size:11px;color:' + (u.last_login ? 'var(--text2)' : 'var(--red)') + '">' + (u.last_login ? fmtDate(u.last_login) : '미접속') + '</td>' +
        '<td style="text-align:center">' + (u.marketing_consent

          : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>') +

      '</tr>';
    }
  }).join('');

  wrap.innerHTML = '<div class="tbl-wrap"><table><thead><tr>' + thead + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function renderConsentPagination(total, page, limit, tab) {
  var el = document.getElementById('consent-pagination');
  if (!el) return;
  var totalPages = Math.max(1, Math.ceil(total / limit));
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  var html = '';
  var start = Math.max(1, page - 2);
  var end   = Math.min(totalPages, page + 2);
  if (page > 1)
    html += '<button class="btn btn-ghost btn-xs" data-tab="' + tab + '" data-page="' + (page-1) + '" onclick="consentPageClick(this)">이전</button>';
  for (var p = start; p <= end; p++) {
    html += '<button class="btn btn-xs" data-tab="' + tab + '" data-page="' + p + '" onclick="consentPageClick(this)" style="' +
      (p === page ? 'background:var(--accent);color:#fff;' : 'background:var(--card);border:1px solid var(--border);color:var(--text2);') + '">' + p + '</button>';
  }
  if (page < totalPages)
    html += '<button class="btn btn-ghost btn-xs" data-tab="' + tab + '" data-page="' + (page+1) + '" onclick="consentPageClick(this)">다음</button>';
  el.innerHTML = html;
}

      '<div class="card-title" style="margin-bottom:14px">채널 연동 안내</div>' +
      '<div class="info-box" style="margin-bottom:10px"><strong>이메일 (Resend)</strong>: RESEND_API_KEY 설정 필수. 발신자 주소는 Resend 대시보드에서 도메인을 인증(Verify Domain)한 뒤 사용하거나, 테스트 시 <code>onboarding@resend.dev</code>를 사용하세요. 선택적으로 RESEND_FROM 환경변수에 <code>이름 &lt;email@domain.com&gt;</code> 형식으로 발신자를 지정할 수 있습니다.</div>' +
      '<div class="info-box" style="margin-bottom:10px"><strong>Solapi (SMS/MMS/알림톡)</strong>: SOLAPI_API_KEY, SOLAPI_API_SECRET, SOLAPI_SENDER 환경 변수를 Cloudflare Pages 대시보드에서 설정하세요.</div>' +
      '<div class="info-box" style="margin-bottom:10px"><strong>FCM 앱 푸시</strong>: FCM_SERVER_KEY를 Cloudflare Pages 환경 변수에 설정하고, 클라이언트에서 /api/marketing-automation?action=register_app_token 으로 토큰 등록이 필요합니다.</div>' +
      '<div class="info-box"><strong>웹 푸시 (VAPID)</strong>: VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT 환경 변수 설정 후 클라이언트에서 service worker 구독 등록이 필요합니다.</div>' +

async function sendTestEmail() {
  var toEl   = document.getElementById('test-email-to');
  var fromEl = document.getElementById('test-email-from');
  var to   = (toEl   ? toEl.value   : '').trim();
  var from = (fromEl ? fromEl.value : '').trim();
  if (!to) { toast('수신자 이메일을 입력하세요', 'error'); return; }
  var btn = document.getElementById('test-email-btn');
  var res = document.getElementById('test-email-result');
  if (btn) { btn.disabled = true; btn.textContent = '발송 중...'; }
  if (res) { res.innerHTML = '<span style="color:var(--text3)">⏳ 발송 중...</span>'; }
  var r = await apiFetch('?action=test_email_send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ to: to, from: from || undefined }),
  }).catch(function() { return {}; });
  if (btn) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> 테스트 발송'; }
  if (r.ok) {
    if (res) res.innerHTML = '<span style="color:var(--green)">✅ ' + esc(r.message||'발송 성공') + '</span>';
    toast('테스트 메일 발송 성공!', 'success');
  } else {
    var errMsg = r.error || '알 수 없는 오류';
    if (res) res.innerHTML = '<span style="color:var(--red)">❌ ' + esc(errMsg) + '</span>';
    toast('발송 실패: ' + errMsg, 'error');
  }
}

function settingCard(title, color, envKey, desc, iconSvg) {
  return '<div class="card" style="border-top:3px solid ' + color + '">' +
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">' +
      iconSvg +
      '<div><div style="font-weight:700;font-size:14px">' + title + '</div><div style="font-size:12px;color:var(--text3)">' + desc + '</div></div>' +
    '</div>' +
    '<div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600;text-transform:uppercase">환경변수</div>' +
    '<code style="background:#f1f5f9;border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:12px;display:block">' + envKey + '</code>' +
  '</div>';
}

function saveSettings() { toast('Cloudflare Pages 대시보드에서 환경변수를 설정하세요', 'info'); }

// 캠페인 결과 상세 뷰
// ═════════════════════════════════════════════════════════════════════════
async function viewCampaignResult(id) {
  loading();
  var d = await apiFetch('?action=campaign_result&id=' + id).catch(function() { return {}; });
  if (!d.ok) { setContent('<div class="empty">' + ICONS.warning + '<p>데이터를 불러올 수 없습니다.</p></div>'); return; }
  var c = d.campaign || {};
  var s = d.stats || {};
  var sample = d.sample || [];
  var hourly = d.hourly || [];

  // 퍼널 바 차트 계산
  var funnelMax = s.sent || 1;
  function fBar(val, color) {
    var pctW = Math.max(2, Math.round((val / funnelMax) * 100));
    return '<div style="height:8px;background:' + color + ';width:' + pctW + '%;border-radius:4px;transition:width .4s"></div>';
  }

  // 시간별 차트
  var maxH = Math.max.apply(null, hourly.map(function(h) { return h.cnt || 0; })) || 1;
  var hourlyChart = '<div style="display:flex;align-items:flex-end;gap:3px;height:48px;margin-top:8px">' +
    hourly.map(function(h) {
      var ht = Math.max(2, Math.round((h.cnt / maxH) * 44));
      return '<div title="' + h.hour + '시: ' + h.cnt + '건" style="flex:1;background:var(--blue);border-radius:3px 3px 0 0;height:' + ht + 'px;opacity:.8"></div>';
    }).join('') +
  '</div>';

  setContent(
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">' +
      '<button class="btn btn-ghost btn-xs" onclick="renderCampaigns()">' + ICONS.arrow_l + ' 목록</button>' +
      '<div class="section-title" style="margin:0">' + esc(c.name) + ' — 캠페인 결과</div>' +
      '<div>' + chBadge(c.channel) + '</div>' +
      '<div>' + statusBadge(c.status) + '</div>' +
    '</div>' +

    // KPI 카드
    '<div class="grid4" style="margin-bottom:20px">' +
      kpiCard('발송', fmtN(s.sent), 'var(--blue)', '#eff6ff',     '<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>') +
      kpiCard('전달률', s.delivery_rate + '%', 'var(--green)', '#ecfdf5', '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>') +
      kpiCard('열람률', s.open_rate + '%', 'var(--accent2)', '#f5f3ff',   '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>') +
      kpiCard('클릭률', s.click_rate + '%', 'var(--cyan)', '#ecfeff',    '<svg viewBox="0 0 24 24"><path d="M15 15l6 6m-11-4a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"/></svg>') +
    '</div>' +
    '<div class="grid4" style="margin-bottom:20px">' +
      kpiCard('전환수', fmtN(s.converted), 'var(--orange)', '#fff7ed',  '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>') +
      kpiCard('전환율', s.conv_rate + '%', 'var(--red)', '#fef2f2',     '<svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>') +
      kpiCard('전환매출', '₩' + fmtN(s.revenue), 'var(--green)', '#ecfdf5', '<svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>') +
      kpiCard('구매건수', fmtN(s.purchases), 'var(--blue)', '#eff6ff',   '<svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>') +
    '</div>' +

    '<div class="grid2" style="margin-bottom:20px">' +
      // 발송 퍼널
      '<div class="card">' +
        '<div class="card-header"><div class="card-title">발송 퍼널</div></div>' +
        '<div style="display:flex;flex-direction:column;gap:12px;padding:4px 0">' +
          funnelRow('발송', s.sent, fBar(s.sent, 'var(--blue)'), null) +
          funnelRow('전달', s.delivered, fBar(s.delivered, 'var(--green)'), s.delivery_rate) +
          funnelRow('열람', s.opened, fBar(s.opened, 'var(--accent2)'), s.open_rate) +
          funnelRow('클릭', s.clicked, fBar(s.clicked, 'var(--cyan)'), s.click_rate) +
          funnelRow('전환', s.converted, fBar(s.converted, 'var(--orange)'), s.conv_rate) +
        '</div>' +
      '</div>' +
      // 시간별 발송
      '<div class="card">' +
        '<div class="card-header"><div class="card-title">시간별 발송</div></div>' +
        (hourly.length ? hourlyChart : '<div class="empty" style="padding:20px"><p>데이터 없음</p></div>') +
        '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px">' +
          (hourly.length ? '<span>' + (hourly[0]||{}).hour + '시</span><span>' + (hourly[hourly.length-1]||{}).hour + '시</span>' : '') +
        '</div>' +
      '</div>' +
    '</div>' +

    // 추가 지표
    '<div class="card" style="margin-bottom:20px">' +
      '<div class="card-header"><div class="card-title">상세 지표</div></div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;padding:4px 0">' +
        metricPill('실패', fmtN(s.failed), '#ef4444') +
        metricPill('반송', fmtN(s.bounced), '#f97316') +
        metricPill('수신거부', fmtN(s.unsubscribed), '#94a3b8') +
        metricPill('평균주문액', '₩' + fmtN(Math.round(s.revenue / (s.purchases || 1))), '#10b981') +
      '</div>' +
    '</div>' +

    // 최근 발송 샘플
    (sample.length ?
      '<div class="card">' +
        '<div class="card-header"><div class="card-title">최근 발송 이력</div></div>' +
        '<div class="tbl-wrap"><table><thead><tr><th>수신자</th><th>이메일</th><th>상태</th><th>발송시각</th></tr></thead><tbody>' +
        sample.map(function(r) {
          return '<tr><td>' + esc(r.name||'-') + '</td><td style="font-size:12px;color:var(--text3)">' + esc(r.email||'-') + '</td>' +
            '<td>' + statusBadge(r.status) + '</td>' +
            '<td style="font-size:11px;color:var(--text3)">' + fmtDate(r.sent_at) + '</td></tr>';
        }).join('') +
        '</tbody></table></div>' +
      '</div>' : ''
    )
  );
}

function funnelRow(label, val, bar, rate) {
  return '<div>' +
    '<div style="display:flex;justify-content:space-between;margin-bottom:4px">' +
      '<span style="font-size:13px;font-weight:600">' + label + '</span>' +
      '<span style="font-size:13px;color:var(--text2)">' + fmtN(val||0) + (rate !== null ? ' <span style="font-size:11px;color:var(--text3)">(' + rate + '%)</span>' : '') + '</span>' +
    '</div>' +
    bar +
  '</div>';
}
function metricPill(label, val, color) {
  return '<div style="background:var(--surface2);border-radius:8px;padding:10px 14px">' +
    '<div style="font-size:11px;color:var(--text3);margin-bottom:4px">' + label + '</div>' +
    '<div style="font-size:18px;font-weight:700;color:' + color + '">' + val + '</div>' +
  '</div>';
}

      var discLabel = p.discount_type === 'percent' ? p.discount_value + '%' : '₩' + fmtN(p.discount_value);
      return '<tr>' +
        '<td><div style="font-weight:700">' + esc(p.name) + '</div>' +
          '<div style="font-size:11px;color:var(--text3)">' + p.code + '</div></td>' +
        '<td><span class="tag">' + esc(p.plan_name||'-') + '</span></td>' +
        '<td>' +
          '<span style="color:var(--red);font-weight:700">' + discLabel + ' 할인</span>' +
          '<div style="font-size:11px;color:var(--text3)">₩' + fmtN(p.original_price) + ' → ₩' + fmtN(p.final_price) + '</div>' +

        '<td>' +

            '<button class="btn btn-ghost btn-xs" data-url="' + url + '" onclick="copyPromoUrl(this)">' + ICONS.copy + '</button>' +
          '</div>' +
        '</td>' +
        '<td style="font-weight:600">' + fmtN(p.view_count||0) + '</td>' +
        '<td style="font-weight:600;color:var(--green)">' + fmtN(p.conversion_count||0) + '</td>' +
        '<td style="font-weight:700;color:var(--blue)">' + convRate + '</td>' +
        '<td style="font-size:11px;color:var(--text3)">' + (p.expires_at ? fmtDate(p.expires_at) : '무제한') + '</td>' +
        '<td>' + (p.is_active ? '<span class="badge badge-green">활성</span>' : '<span class="badge badge-gray">비활성</span>') + '</td>' +
        '<td><div style="display:flex;gap:4px">' +
          '<button class="btn btn-primary btn-xs" data-pid="' + p.id + '" onclick="promoStatsClick(this)">' + ICONS.chart + ' 분석</button>' +
          '<button class="btn btn-ghost btn-xs" data-pid="' + p.id + '" onclick="promoEditClick(this)">' + ICONS.edit + '</button>' +
          '<button class="btn btn-ghost btn-xs" style="color:var(--red)" data-pid="' + p.id + '" onclick="promoDeleteClick(this)">' + ICONS.trash + '</button>' +
        '</div></td>' +
      '</tr>';
    }).join('');
    html += '</tbody></table></div></div>';
  }

  // 모달
  html += '<div class="modal-overlay" id="modal-promo"><div class="modal" style="max-width:600px"><div class="modal-header">' +

    '<div class="modal-body">' +
      '<input type="hidden" id="edit-promo-id">' +
      '<div class="form-grid2">' +
        '<div class="form-group"><label>프로모션명 *</label><input id="p-name" placeholder="예: 스타터 50% 봄 특가"></div>' +

          '<select id="p-plan-id"><option value="starter">스타터 플랜</option><option value="pro">프로 플랜</option><option value="business">비즈니스 플랜</option><option value="custom">기타</option></select>' +

      '<div class="form-group"><label>뱃지 텍스트</label><input id="p-badge" placeholder="🔥 한정 특가"></div>' +
      '<div class="form-group"><label>제목 *</label><input id="p-ltitle" placeholder="스타터 플랜 50% 할인"></div>' +
      '<div class="form-group"><label>서브타이틀</label><input id="p-lsub" placeholder="지금 가입하면 첫 달 반값!"></div>' +
