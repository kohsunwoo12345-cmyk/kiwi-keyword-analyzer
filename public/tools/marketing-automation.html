      '<div class="form-grid2">' +
        '<div class="form-group"><label>CTA 버튼 텍스트</label><input id="p-cta" placeholder="지금 시작하기" value="지금 시작하기"></div>' +
        '<div class="form-group"><label>UTM 소스</label><input id="p-utm" placeholder="email, sms, kakao..."></div>' +
      '</div>' +
    '</div>' +
    '<div class="modal-footer"><button class="btn btn-ghost" onclick="closePromoModal()">취소</button>' +
      '<button class="btn btn-primary" onclick="savePromo()">저장 및 URL 발급</button></div>' +
  '</div></div>';

  setContent(html);
}

function copyPromoUrl(btn) {
  var url = location.origin + (btn.getAttribute('data-url') || '');
  navigator.clipboard.writeText(url).then(function() { toast('URL 복사 완료', 'success'); }).catch(function() { toast('복사 실패', 'error'); });
}

function calcFinalPrice() {
  var orig  = parseFloat(document.getElementById('p-orig').value) || 0;
  var dval  = parseFloat(document.getElementById('p-dval').value) || 0;
  var dtype = document.getElementById('p-dtype').value;
  var final = dtype === 'percent' ? Math.round(orig * (1 - dval / 100)) : Math.max(0, orig - dval);
  document.getElementById('p-final').value = final;
}

function openPromoModal(data) {
  document.getElementById('edit-promo-id').value = data && data.id ? data.id : '';
  document.getElementById('modal-promo-title').textContent = data && data.id ? '프로모션 편집' : '새 프로모션';
  document.getElementById('p-name').value    = data ? data.name||'' : '';
  document.getElementById('p-plan-id').value = data ? data.plan_id||'starter' : 'starter';
  document.getElementById('p-dtype').value   = data ? data.discount_type||'percent' : 'percent';
  document.getElementById('p-dval').value    = data ? data.discount_value||'' : '';
  document.getElementById('p-orig').value    = data ? data.original_price||'' : '';
  document.getElementById('p-final').value   = data ? data.final_price||'' : '';
  document.getElementById('p-maxuse').value  = data ? data.max_uses||'' : '';
  document.getElementById('p-expire').value  = data ? data.expires_at||'' : '';
  document.getElementById('p-badge').value   = data ? data.landing_badge||'한정 특가' : '한정 특가';
  document.getElementById('p-ltitle').value  = data ? data.landing_title||'' : '';
  document.getElementById('p-lsub').value    = data ? data.landing_subtitle||'' : '';
  document.getElementById('p-lbody').value   = data ? data.landing_body||'' : '';
  document.getElementById('p-cta').value     = data ? data.landing_cta||'지금 시작하기' : '지금 시작하기';
  document.getElementById('p-utm').value     = data ? data.utm_source||'' : '';
  openModal('modal-promo');
}

async function savePromo() {
  var id = document.getElementById('edit-promo-id').value;
  var payload = {
    id: id ? parseInt(id, 10) : undefined,
    name: document.getElementById('p-name').value,
    plan_id: document.getElementById('p-plan-id').value,
    plan_name: document.getElementById('p-plan-id').options[document.getElementById('p-plan-id').selectedIndex].text,
    discount_type:  document.getElementById('p-dtype').value,
    discount_value: parseFloat(document.getElementById('p-dval').value) || 0,
    original_price: parseInt(document.getElementById('p-orig').value) || 0,
    final_price:    parseInt(document.getElementById('p-final').value) || 0,
    max_uses:   document.getElementById('p-maxuse').value ? parseInt(document.getElementById('p-maxuse').value) : null,
    expires_at: document.getElementById('p-expire').value || null,
    landing_badge:    document.getElementById('p-badge').value,
    landing_title:    document.getElementById('p-ltitle').value,
    landing_subtitle: document.getElementById('p-lsub').value,
    landing_body:     document.getElementById('p-lbody').value,
    landing_cta:      document.getElementById('p-cta').value,
    utm_source:       document.getElementById('p-utm').value,
  };
  if (!payload.name || !payload.landing_title) { toast('필수 항목을 입력하세요', 'error'); return; }
  var action = id ? 'update_promotion' : 'create_promotion';
  var d = await apiFetch('?action=' + action, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).catch(function() { return {}; });
  if (d.ok) {
    closeModal('modal-promo');
    if (!id && d.url) {
      toast('프로모션 생성 완료! URL: ' + d.url, 'success');
    } else {
      toast('저장 완료', 'success');
    }
    renderPromotions();
  } else {
    toast(d.error || '저장 실패', 'error');
  }
}

async function editPromo(id) {
  var d = await apiFetch('?action=promotion&id=' + id).catch(function() { return {}; });
  if (d.ok && d.promotion) openPromoModal(d.promotion);
}

async function deletePromo(id) {
  if (!confirm('프로모션을 삭제하면 해당 URL이 비활성화됩니다. 계속할까요?')) return;
  var d = await apiFetch('?action=delete_promotion', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id }) }).catch(function() { return {}; });
  if (d.ok) { toast('삭제 완료', 'success'); renderPromotions(); } else toast(d.error || '삭제 실패', 'error');
}

// ─ 프로모션 상세 분석 ─────────────────────────────────────────────────────
async function viewPromoStats(id) {
  loading();
  var d = await apiFetch('?action=promotion_stats&id=' + id).catch(function() { return {}; });
  if (!d.ok) { setContent('<div class="empty">' + ICONS.warning + '<p>데이터 없음</p></div>'); return; }
  var p  = d.promotion || {};
  var s  = d.stats || {};
  var dv = d.daily_views || [];
  var dc = d.daily_convs || [];
  var refs = d.referrers || [];
  var devs = d.devices || [];

  // 일별 차트 (30일)
  var allDates = {};
  dv.forEach(function(r) { allDates[r.date] = { views: r.cnt, convs: 0 }; });
  dc.forEach(function(r) { if (allDates[r.date]) allDates[r.date].convs = r.cnt; else allDates[r.date] = { views: 0, convs: r.cnt }; });
  var chartDates = Object.keys(allDates).sort();
  var maxVal = Math.max.apply(null, chartDates.map(function(dt) { return allDates[dt].views; })) || 1;
  var dailyChart =
    '<div style="display:flex;align-items:flex-end;gap:2px;height:60px">' +
    chartDates.map(function(dt) {
      var h = Math.max(2, Math.round((allDates[dt].views / maxVal) * 56));
      var hc = allDates[dt].convs > 0 ? Math.max(2, Math.round((allDates[dt].convs / maxVal) * 56)) : 0;
      return '<div style="flex:1;display:flex;align-items:flex-end;gap:1px" title="' + dt + '">' +
        '<div style="flex:1;background:var(--blue);opacity:.7;border-radius:2px 2px 0 0;height:' + h + 'px"></div>' +
        (hc ? '<div style="flex:1;background:var(--green);border-radius:2px 2px 0 0;height:' + hc + 'px"></div>' : '') +
      '</div>';
    }).join('') +
    '</div>' +
    '<div style="display:flex;gap:16px;font-size:11px;color:var(--text3);margin-top:4px">' +
      '<span><span style="display:inline-block;width:8px;height:8px;background:var(--blue);border-radius:1px;margin-right:4px"></span>페이지뷰</span>' +
      '<span><span style="display:inline-block;width:8px;height:8px;background:var(--green);border-radius:1px;margin-right:4px"></span>전환</span>' +
    '</div>';

  // 기기 비율
  var totalDev = devs.reduce(function(s, r) { return s + (r.cnt || 0); }, 0) || 1;
  var devChart = '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
    devs.map(function(r) {
      var pct = Math.round((r.cnt / totalDev) * 100);
      var color = r.device_type === 'mobile' ? 'var(--blue)' : r.device_type === 'tablet' ? 'var(--accent2)' : 'var(--green)';
      return '<div style="flex:1;min-width:80px;text-align:center;background:var(--surface2);border-radius:8px;padding:10px">' +
        '<div style="font-size:18px;font-weight:700;color:' + color + '">' + pct + '%</div>' +
        '<div style="font-size:11px;color:var(--text3)">' + (r.device_type||'기타') + '</div>' +
      '</div>';
    }).join('') +
  '</div>';

  setContent(
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">' +
      '<button class="btn btn-ghost btn-xs" onclick="renderPromotions()">' + ICONS.arrow_l + ' 목록</button>' +
      '<div class="section-title" style="margin:0">' + esc(p.name) + ' 분석</div>' +
      '<code style="font-size:12px;background:#f1f5f9;padding:3px 8px;border-radius:6px">/promo/' + p.code + '</code>' +
    '</div>' +

    '<div class="grid4" style="margin-bottom:20px">' +
      kpiCard('총 조회수', fmtN(s.total_views), 'var(--blue)', '#eff6ff', '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>') +
      kpiCard('순 방문자', fmtN(s.unique_views), 'var(--cyan)', '#ecfeff', '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>') +
      kpiCard('구매/전환', fmtN(s.purchases), 'var(--green)', '#ecfdf5', '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>') +
      kpiCard('전환율', s.conv_rate + '%', 'var(--orange)', '#fff7ed', '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>') +
    '</div>' +
    '<div class="grid4" style="margin-bottom:20px">' +
      kpiCard('총 매출', '₩' + fmtN(s.revenue), 'var(--green)', '#ecfdf5', '<svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>') +
      kpiCard('평균주문', '₩' + fmtN(Math.round(s.avg_order)), 'var(--accent2)', '#f5f3ff', '<svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg>') +
      kpiCard('남은 사용', s.remaining_uses !== null ? fmtN(s.remaining_uses) : '무제한', 'var(--blue)', '#eff6ff', '<svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>') +
      kpiCard('상태', p.is_active ? '활성' : '비활성', p.is_active ? 'var(--green)' : 'var(--text3)', '#f8fafc', '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>') +
    '</div>' +

    '<div class="grid2" style="margin-bottom:20px">' +
      '<div class="card"><div class="card-header"><div class="card-title">일별 조회 · 전환 추이 (30일)</div></div>' +
        (chartDates.length ? dailyChart : '<div class="empty" style="padding:16px"><p>데이터 없음</p></div>') +
      '</div>' +
      '<div class="card"><div class="card-header"><div class="card-title">기기 유형</div></div>' +
        (devs.length ? devChart : '<div class="empty" style="padding:16px"><p>데이터 없음</p></div>') +
      '</div>' +
    '</div>' +

    (refs.length ?
      '<div class="card" style="margin-bottom:20px"><div class="card-header"><div class="card-title">유입 경로 Top 10</div></div>' +
        '<div class="tbl-wrap"><table><thead><tr><th>유입 경로</th><th>방문수</th></tr></thead><tbody>' +
        refs.map(function(r) { return '<tr><td>' + esc(r.referrer||'직접 접속') + '</td><td style="font-weight:600">' + fmtN(r.cnt) + '</td></tr>'; }).join('') +
        '</tbody></table></div></div>' : ''
    )
  );
}

// ═════════════════════════════════════════════════════════════════════════
// 퍼널 CRM 리포트
// ═════════════════════════════════════════════════════════════════════════
var funnelCRMFunnelId = null;
var funnelCRMFrom = '';
var funnelCRMTo   = '';

async function renderFunnelCRM() {
  loading();
  // 퍼널(캔버스) 목록 로드
  var fl = await apiFetch('?action=funnel_list').catch(function() { return {}; });
  var funnels = fl.funnels || [];

  var today = new Date().toISOString().slice(0, 10);
  var d30ago = new Date(Date.now() - 30 * 86400000).toISOString().slice(0, 10);
  funnelCRMFrom = funnelCRMFrom || d30ago;
  funnelCRMTo   = funnelCRMTo   || today;
  funnelCRMFunnelId = funnelCRMFunnelId || (funnels.length ? funnels[0].id : null);

  // 필터 바
  var filterBar =
    '<div class="card" style="margin-bottom:16px">' +
      '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">' +
        '<div style="display:flex;align-items:center;gap:6px">' +
          '<label style="font-size:12px;font-weight:600;color:var(--text2)">퍼널:</label>' +
          '<select id="crm-funnel-sel" onchange="onCRMFunnelChange(this)" style="font-size:13px">' +
            '<option value="">전체</option>' +
            funnels.map(function(f) { return '<option value="' + f.id + '"' + (funnelCRMFunnelId == f.id ? ' selected' : '') + '>' + esc(f.name) + '</option>'; }).join('') +
          '</select>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:6px">' +
          '<label style="font-size:12px;font-weight:600;color:var(--text2)">기간:</label>' +
          '<input id="crm-from" type="date" value="' + funnelCRMFrom + '" style="font-size:13px">' +
          '<span style="color:var(--text3)">~</span>' +
          '<input id="crm-to" type="date" value="' + funnelCRMTo + '" style="font-size:13px">' +
        '</div>' +
        '<button class="btn btn-primary btn-xs" onclick="loadCRMReport()">조회</button>' +
      '</div>' +
    '</div>';

  setContent(
    '<div style="margin-bottom:16px"><div class="section-title">퍼널 CRM 리포트</div>' +
      '<div class="section-sub">문자 발송 → 랜딩 방문 → 신청/전환 · 퍼널 단계별 종합 성과</div>' +
    '</div>' +
    filterBar +
    '<div id="crm-report-body"><div class="empty">' + ICONS.funnel + '<p>위 조건을 선택 후 [조회]를 누르세요.</p></div></div>'
  );

  // 초기 자동 로드
  if (funnelCRMFunnelId || true) loadCRMReport();
}

function onCRMFunnelChange(sel) { funnelCRMFunnelId = sel.value || null; }

async function loadCRMReport() {
  var fid  = (document.getElementById('crm-funnel-sel') ? document.getElementById('crm-funnel-sel').value : '') || '';
  var from = (document.getElementById('crm-from') ? document.getElementById('crm-from').value : '') || funnelCRMFrom;
  var to   = (document.getElementById('crm-to')   ? document.getElementById('crm-to').value   : '') || funnelCRMTo;
  funnelCRMFunnelId = fid || null;
  funnelCRMFrom = from;
  funnelCRMTo   = to;

  var body = document.getElementById('crm-report-body');
  if (body) body.innerHTML = '<div class="empty">' + SPIN_CSS + ICONS.spinner + '<p style="margin-top:10px">분석 중...</p></div>';

  var params = '?action=funnel_crm&from=' + from + '&to=' + to + (fid ? '&funnel_id=' + fid : '');
  var d = await apiFetch(params).catch(function() { return {}; });

  if (!d.ok) {
    if (body) body.innerHTML = '<div class="empty">' + ICONS.warning + '<p>데이터를 불러올 수 없습니다.</p></div>';
    return;
  }

  var k = d.kpi || {};
  var funnel = d.funnel || [];
  var smsChs = d.sms_channels || [];
  var daily  = d.daily || [];

  // 퍼널 시각화
  var funnelMax = funnel.reduce(function(m, f) { return Math.max(m, f.value || 0); }, 1);
  var funnelViz =
    '<div style="display:flex;flex-direction:column;gap:0">' +
    funnel.map(function(f, i) {
      var wPct = Math.max(20, Math.round((f.value / funnelMax) * 100));
      var colors = ['#6366f1','#10b981','#8b5cf6','#f97316'];
      return '<div style="margin:0 auto;width:' + wPct + '%;min-width:200px;background:' + colors[i % colors.length] + ';color:#fff;padding:12px 20px;border-radius:' + (i===0?'10px 10px 0 0':i===funnel.length-1?'0 0 10px 10px':'0') + ';display:flex;justify-content:space-between;align-items:center;transition:width .5s">' +
        '<span style="font-weight:700;font-size:14px">' + f.step + '</span>' +
        '<div style="text-align:right">' +
          '<div style="font-size:20px;font-weight:800">' + fmtN(f.value||0) + '</div>' +
          (f.rate !== undefined ? '<div style="font-size:11px;opacity:.85">' + f.rate + '% 전환</div>' : '') +
        '</div>' +
      '</div>';
    }).join('<div style="width:2px;background:#e2e8f0;margin:0 auto;height:6px"></div>') +
    '</div>';

  // 일별 발송 차트
  var maxSend = Math.max.apply(null, daily.map(function(r) { return r.sends || 0; })) || 1;
  var dailyChart = daily.length ?
    '<div style="display:flex;align-items:flex-end;gap:3px;height:60px">' +
    daily.map(function(r) {
      var h = Math.max(2, Math.round(((r.sends||0) / maxSend) * 56));
      return '<div style="flex:1;background:var(--blue);opacity:.8;border-radius:2px 2px 0 0;height:' + h + 'px" title="' + r.date + ': ' + r.sends + '건"></div>';
    }).join('') +
    '</div>' : '<div class="empty" style="padding:16px"><p>데이터 없음</p></div>';

  var html =
    // KPI 카드
    '<div class="grid4" style="margin-bottom:20px">' +
      kpiCard('문자 발송', fmtN(k.total_sent), 'var(--blue)', '#eff6ff', '<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>') +
      kpiCard('랜딩 방문', fmtN(k.unique_visitors), 'var(--accent2)', '#f5f3ff', '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>') +
      kpiCard('신청/전환', fmtN(k.applications), 'var(--green)', '#ecfdf5', '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>') +
      kpiCard('총 매출', '₩' + fmtN(k.revenue), 'var(--orange)', '#fff7ed', '<svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>') +
    '</div>' +
    '<div class="grid4" style="margin-bottom:20px">' +
      kpiCard('전달률', k.delivery_rate + '%', 'var(--cyan)', '#ecfeff', '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>') +
      kpiCard('랜딩전환율', k.landing_rate + '%', 'var(--blue)', '#eff6ff', '<svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>') +
      kpiCard('최종전환율', k.conv_rate + '%', 'var(--green)', '#ecfdf5', '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>') +
      kpiCard('평균주문액', '₩' + fmtN(k.avg_order), 'var(--accent2)', '#f5f3ff', '<svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg>') +
    '</div>' +

    '<div class="grid2" style="margin-bottom:20px">' +
      '<div class="card"><div class="card-header"><div class="card-title">퍼널 단계별 전환</div></div>' +
        '<div style="padding:16px 0">' + funnelViz + '</div>' +
      '</div>' +
      '<div class="card"><div class="card-header"><div class="card-title">일별 발송 추이</div></div>' +
        dailyChart +
      '</div>' +
    '</div>' +

    // SMS 채널별 성과
    (smsChs.length ?
      '<div class="card" style="margin-bottom:20px"><div class="card-header"><div class="card-title">채널별 발송 성과</div></div>' +
        '<div class="tbl-wrap"><table><thead><tr><th>채널</th><th>발송</th><th>전달</th><th>클릭</th><th>수신자</th><th>전달률</th></tr></thead><tbody>' +
        smsChs.map(function(r) {
          var dr = r.total_sent > 0 ? ((r.delivered / r.total_sent) * 100).toFixed(1) : '0';
          return '<tr>' +
            '<td>' + chBadge(r.channel) + '</td>' +
            '<td style="font-weight:700">' + fmtN(r.total_sent||0) + '</td>' +
            '<td style="color:var(--green)">' + fmtN(r.delivered||0) + '</td>' +
            '<td style="color:var(--blue)">' + fmtN(r.clicked||0) + '</td>' +
            '<td>' + fmtN(r.unique_recipients||0) + '</td>' +
            '<td style="font-weight:700">' + dr + '%</td>' +
          '</tr>';
        }).join('') +
        '</tbody></table></div></div>' : ''
    ) +

    // ROI 요약
    '<div class="card"><div class="card-header"><div class="card-title">ROI 요약</div></div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:8px 0">' +
        metricPill('총 발송비용 (문자 단가 10원)', '₩' + fmtN(k.total_sent * 10), '#64748b') +
        metricPill('총 매출', '₩' + fmtN(k.revenue), '#10b981') +
        metricPill('결제 유저', fmtN(k.paying_users), '#6366f1') +
        metricPill('ARPU', '₩' + fmtN(k.arpu), '#8b5cf6') +
        metricPill('추정 ROI', k.total_roi + '%', k.total_roi >= 100 ? '#10b981' : '#f97316') +
      '</div>' +
    '</div>';

  if (body) body.innerHTML = html;
}
